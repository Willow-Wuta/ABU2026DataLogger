<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging Assister</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="callout title">        
        <h2>Main Clock</h2>

        <h2 id="MainClock">00:00:00</h2>
        <div class = "button-group">
            <button onclick="start()">Start</button>
            <button onclick="stop()">Stop</button>
            <button onclick="clearTimer()">Clear</button>
        </div>
        
        <hr width="300" color="#a0a0a0">
        
        <div class = "button-group">
            
            <label for="team-search" >Team:</label>
            <input list="team-names" id="team-search" name="team-search" placeholder="Search...">
    
            <datalist id="team-names">
                <!-- Uni -->
                <option value="iRap-Savior">
                <option value="Ivec">
                <option value="Anong">
                <option value="Chai">
                
                <!-- Voca -->
                <option value="สาเกตนคร Robot">
                <option value="ดอนเมือง">
                <option value="KTC.DINOROBOT">
                <option value="ขุนด่านปราการชล">
                <option value="LTC.Robot">
                    
                <option value="สาละวิน Robot">
                <option value="หมูชะมวง">
                <option value="ยูคาลิปตัส">
                <option value="ช้างน้าว Robot">
                <option value="KKWIND The Conqueror">

                <option value="รวงทองโรบอท">
                <option value="แขวงเมืองวิเศษไชยชาญ">

                </datalist>

            <label for="color">Side:</label>
            <select id="color" name="color">
                <option value="" disabled selected></option>
                <option value="Red">Red</option>
                <option value="Blue">Blue</option>
            </select>

        </div>

    </div>


    <div class="callout zone1">
        <h2>Zone 1</h2>  
                
        <div class="spear-section">
            <h4>Spear</h4>
            <input type="checkbox" onclick="logEvent('1', this)">
            <input type="checkbox" onclick="logEvent('2', this)">
            <input type="checkbox" onclick="logEvent('3', this)">
            <input type="checkbox" onclick="logEvent('4', this)">
            <p>R1 ← Rack → R2</p>
        </div>

        <div class="spearhead-section">
            <h4>Spear Head</h4>
            <input type="checkbox" onclick="logEvent('Spear1', this)">
            <input type="checkbox" onclick="logEvent('Fist1', this)">
            <input type="checkbox" onclick="logEvent('Hand1', this)">
            <input type="checkbox" onclick="logEvent('Hand2', this)">
            <input type="checkbox" onclick="logEvent('Fist2', this)">
            <input type="checkbox" onclick="logEvent('Spear2', this)">
            <p>Outside ← Rack → Zone 2</p>
        </div>

        <hr color="#a0a0a0">

        <div class="button-group">
            <button id="zone1Start" onclick="zone1Return()" disabled>Start</button>
            <button onclick="SpearAssem()">Assem</button>
        </div>
        
    </div>

    <div class="callout logger">
        <h2>Log</h2>
        <hr class="log-divider" color="#a0a0a0">
        <div id="logOutput">No events logged yet.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
